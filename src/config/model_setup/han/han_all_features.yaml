# src/config/model_setup/han/han_all_features.yaml

graph:
  type: heterogeneous
  num_neighbors: [13, 10]
  node_features: all

model:
  name: han
  hidden_dim: 32
  num_layers: 2
  heads: 8
  dropout: 0.3

training:
  device: cuda
  batch_size: 256
  epochs: 500
  lr: 0.005
  weight_decay: 0.005
  patience: 50
  monitor_metric: f1_macro
