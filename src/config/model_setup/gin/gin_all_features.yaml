# src/config/model_setup/gin/gin_all.yaml

graph:
  type: homogeneous
  edge_keys:
    - Actor1ID
    - Actor2ID
    - Event_GeoID
    - Day
  num_neighbors: [13, 10]
  node_features: all

model:
  name: gin
  hidden_dim: 64
  num_layers: 2
  dropout: 0.3
  num_classes: 4

training:
  device: cuda
  batch_size: 512
  epochs: 300
  lr: 0.005
  weight_decay: 0.0001
  patience: 30
