# actor_attribute_only.yaml
# Actor ablation — no message passing, attribute embeddings only
# Reference: sage / hyperspherical / riemannian_product / geometry_aware(gated)
# This file: attribute_only / hyperspherical / riemannian_product / geometry_aware(gated)
#
# Fully inductive actor encoder: no graph topology is used. Actor identity
# is represented solely by the 8 categorical attribute embeddings. Comparing
# against GNN variants reveals how much relational structure helps.

training:
  batch_size: 512
  epochs: 200
  patience: 30
  lr: 0.001
  weight_decay: 0.0001
  device: cuda
  num_workers: 0
  monitor_metric: f1_macro

model:
  actor:
    type: attribute_only
    feat_embed_dim: 16
    hidden_dim: 128
    out_dim: 64
    dropout: 0.2
    # note: num_layers not applicable (no message passing)

  geo:
    type: hyperspherical
    out_dim: 32
    hidden_dim: 64

  temporal:
    type: riemannian_product
    out_dim: 16
    hidden_dim: 32

  fusion:
    type: geometry_aware
    inner_type: gated
    hidden_dim: 128
    dropout: 0.2
