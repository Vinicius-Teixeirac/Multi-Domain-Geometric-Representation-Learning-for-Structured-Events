# src/config/model_setup/multi_domain/multi_domain_riemannian_aware.yaml
#
# MultiDomainGeometricModel - fully Riemannian encoders + geometry-aware fusion.
#
# All three domain encoders impose manifold structure, and the fusion is
# geometry-aware: sphere views are log-mapped to their tangent space before
# the inner fusion strategy operates on them.
#
#   geo      : HypersphericalEncoder       -> S^{out-1}
#   temporal : RiemannianProductEncoder    -> S^{out-1}
#   actor    : SAGEConv GNN                -> R^{out}  (Euclidean)
#
# Fusion:
#   geometry_aware wraps gated fusion.
#   Before gating, sphere views are mapped via log_north -> R^{d-1}.
#   The gate and value projections operate in the common tangent space.

training:
  batch_size: 512
  epochs: 200
  patience: 30
  lr: 0.001
  weight_decay: 0.0001
  device: cuda
  num_workers: 0
  monitor_metric: f1_macro

model:
  actor:
    type: sage_gnn
    feat_embed_dim: 16
    hidden_dim: 128
    out_dim: 64
    num_layers: 2
    dropout: 0.2

  geo:
    type: hyperspherical
    out_dim: 32
    hidden_dim: 64

  temporal:
    type: riemannian_product
    out_dim: 16
    hidden_dim: 32

  fusion:
    type: geometry_aware
    inner_type: gated     # concat_mlp | attention | gated
    hidden_dim: 128
    dropout: 0.2
