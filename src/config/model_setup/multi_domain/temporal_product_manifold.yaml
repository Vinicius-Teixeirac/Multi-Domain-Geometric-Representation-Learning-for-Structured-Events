# temporal_product_manifold.yaml
# Temporal ablation — Euclidean MLP on fixed-period product manifold features
# Reference: sage / hyperspherical / riemannian_product / geometry_aware(gated)
# This file: sage / hyperspherical / product_manifold / geometry_aware(gated)
#
# Sin/cos encoding of doy and dow with fixed periods (365, 7), followed
# by an MLP. The temporal output is Euclidean. The geo view is still
# spherical, so geometry_aware fusion applies the log map to geo only.

training:
  batch_size: 512
  epochs: 200
  patience: 30
  lr: 0.001
  weight_decay: 0.0001
  device: cuda
  num_workers: 0
  monitor_metric: f1_macro

model:
  actor:
    type: sage_gnn
    feat_embed_dim: 16
    hidden_dim: 128
    out_dim: 64
    num_layers: 2
    dropout: 0.2

  geo:
    type: hyperspherical
    out_dim: 32
    hidden_dim: 64

  temporal:
    type: product_manifold
    out_dim: 16
    hidden_dim: 32

  fusion:
    type: geometry_aware
    inner_type: gated
    hidden_dim: 128
    dropout: 0.2
