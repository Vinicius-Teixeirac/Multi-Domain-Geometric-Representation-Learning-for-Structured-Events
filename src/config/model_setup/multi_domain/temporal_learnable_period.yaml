# temporal_learnable_period.yaml
# Temporal ablation - product manifold with learnable cycle periods
# Reference: sage / hyperspherical / riemannian_product / geometry_aware(gated)
# This file: sage / hyperspherical / learnable_period / geometry_aware(gated)
#
# Annual and weekly periods are initialised at 365.0 and 7.0 but are free
# to adapt. The temporal output is Euclidean; geometry_aware fusion log-maps
# the geo view only.

training:
  batch_size: 512
  epochs: 200
  patience: 30
  lr: 0.001
  weight_decay: 0.0001
  device: cuda
  num_workers: 0
  monitor_metric: f1_macro

model:
  actor:
    type: sage_gnn
    feat_embed_dim: 16
    hidden_dim: 128
    out_dim: 64
    num_layers: 2
    dropout: 0.2

  geo:
    type: hyperspherical
    out_dim: 32
    hidden_dim: 64

  temporal:
    type: learnable_period
    out_dim: 16
    hidden_dim: 32

  fusion:
    type: geometry_aware
    inner_type: gated
    hidden_dim: 128
    dropout: 0.2
