# fusion_ga_attention.yaml
# Fusion ablation - geometry-aware softmax attention
# Reference: sage / hyperspherical / riemannian_product / geometry_aware(gated)
# This file: sage / hyperspherical / riemannian_product / geometry_aware(attention)
#
# Geometry-aware attention: sphere views are log-mapped to tangent space
# before the attention scoring and value projections. The attention
# mechanism operates in a geometrically homogeneous flat space.

training:
  batch_size: 512
  epochs: 200
  patience: 30
  lr: 0.001
  weight_decay: 0.0001
  device: cuda
  num_workers: 0
  monitor_metric: f1_macro

model:
  actor:
    type: sage_gnn
    feat_embed_dim: 16
    hidden_dim: 128
    out_dim: 64
    num_layers: 2
    dropout: 0.2

  geo:
    type: hyperspherical
    out_dim: 32
    hidden_dim: 64

  temporal:
    type: riemannian_product
    out_dim: 16
    hidden_dim: 32

  fusion:
    type: geometry_aware
    inner_type: attention
    hidden_dim: 128
    dropout: 0.2
    attention_dim: 64
