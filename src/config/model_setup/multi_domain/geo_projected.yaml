# geo_projected.yaml
# Geo ablation - projected encoder (S^2 -> Euclidean MLP -> L2-normalise)
# Reference: sage / hyperspherical / riemannian_product / geometry_aware(gated)
# This file: sage / projected / riemannian_product / geometry_aware(gated)
#
# The output lives on S^{out-1} but intermediate activations are Euclidean.
# Comparing against hyperspherical isolates the value of the Riemannian
# inductive bias (log/exp maps through geodesics vs. arbitrary MLP paths).

training:
  batch_size: 512
  epochs: 200
  patience: 30
  lr: 0.001
  weight_decay: 0.0001
  device: cuda
  num_workers: 0
  monitor_metric: f1_macro

model:
  actor:
    type: sage_gnn
    feat_embed_dim: 16
    hidden_dim: 128
    out_dim: 64
    num_layers: 2
    dropout: 0.2

  geo:
    type: projected
    out_dim: 32
    hidden_dim: 64

  temporal:
    type: riemannian_product
    out_dim: 16
    hidden_dim: 32

  fusion:
    type: geometry_aware
    inner_type: gated
    hidden_dim: 128
    dropout: 0.2
