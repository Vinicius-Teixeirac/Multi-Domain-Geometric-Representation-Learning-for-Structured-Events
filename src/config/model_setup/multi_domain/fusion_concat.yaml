# fusion_concat.yaml
# Fusion ablation — geometry-blind concatenation MLP
# Reference: sage / hyperspherical / riemannian_product / geometry_aware(gated)
# This file: sage / hyperspherical / riemannian_product / concat_mlp
#
# Geometry-blind: sphere embeddings are concatenated directly without log-
# mapping. Comparing against geometry_aware variants measures whether
# respecting manifold structure in the fusion stage matters.

training:
  batch_size: 512
  epochs: 200
  patience: 30
  lr: 0.001
  weight_decay: 0.0001
  device: cuda
  num_workers: 0
  monitor_metric: f1_macro

model:
  actor:
    type: sage_gnn
    feat_embed_dim: 16
    hidden_dim: 128
    out_dim: 64
    num_layers: 2
    dropout: 0.2

  geo:
    type: hyperspherical
    out_dim: 32
    hidden_dim: 64

  temporal:
    type: riemannian_product
    out_dim: 16
    hidden_dim: 32

  fusion:
    type: concat_mlp
    hidden_dim: 128
    dropout: 0.2
