# src/config/model_setup/gat/gat_no_features.yaml

graph:
  type: homogeneous
  edge_keys:
    - Actor1ID
    - Actor2ID
    - Event_GeoID
    - Day
  num_neighbors: [13, 10]
  node_features: none

model:
  name: gat
  hidden_dim: 64
  num_layers: 2
  heads: 4
  dropout: 0.3

training:
  device: cuda
  batch_size: 512
  epochs: 300
  lr: 0.005
  weight_decay: 0.0001
  patience: 30
  monitor_metric: f1_macro
