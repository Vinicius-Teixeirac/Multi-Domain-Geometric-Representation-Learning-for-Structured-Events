# src/config/model_setup/multiview/multiview.yaml
#
# Configuration for the MultiviewGeometricModel.
#
# The model encodes each event component in its geometrically appropriate space:
#   actor_encoder  (WHO/WHOM) - GNN on actor co-occurrence graph
#   geo_encoder    (WHERE)    - hyperspherical encoder  S^{geo_out_dim - 1}
#   time_encoder   (WHEN)     - product manifold  R x S1 x S1

training:
  batch_size: 512
  epochs: 200
  patience: 30
  lr: 0.001
  weight_decay: 0.0001
  device: cuda       # set to 'cpu' if no GPU available
  num_workers: 0
  metric: f1_macro

model:
  # --- Actor GNN encoder (WHO/WHOM) ---
  actor_feat_embed_dim: 16   # embedding dim per actor categorical attribute (8 attrs)
  actor_hidden_dim: 128      # GNN hidden dimension
  actor_out_dim: 64          # output dim for the relational view
  num_gnn_layers: 2          # number of SAGEConv / GATConv layers
  conv_type: sage            # 'sage' (GraphSAGE) or 'gat' (Graph Attention)

  # --- Hyperspherical spatial encoder (WHERE) ---
  geo_hidden_dim: 64
  geo_out_dim: 32            # lives on S^31

  # --- Temporal product manifold encoder (WHEN) ---
  time_hidden_dim: 32
  time_out_dim: 16           # R x S1 x S1 projected to R^16

  # --- Late-fusion classifier ---
  fusion_hidden_dim: 128     # fused_dim = actor_out_dim + geo_out_dim + time_out_dim = 112

  # --- Shared ---
  dropout: 0.2
