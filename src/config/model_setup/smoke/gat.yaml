graph:
  type: homogeneous
  edge_keys:
  - Actor1ID
  - Actor2ID
  - Event_GeoID
  - Day
  num_neighbors:
  - 5
  - 5
  node_features: all
model:
  name: gat
  hidden_dim: 64
  num_layers: 2
  heads: 4
  dropout: 0.3
training:
  device: cuda
  batch_size: 32
  epochs: 5
  lr: 0.005
  weight_decay: 0.0001
  patience: 5
  monitor_metric: f1_macro
