# src/config/model_setup/rgcn/rgcn_no_features.yaml

graph:
  type: heterogeneous
  num_neighbors: [7, 4]
  node_features: none

model:
  name: rgcn
  hidden_dim: 32
  num_layers: 2
  dropout: 0.3

training:
  device: cuda
  batch_size: 256
  epochs: 500
  lr: 0.005
  weight_decay: 0.0001
  patience: 50
  monitor_metric: f1_macro
